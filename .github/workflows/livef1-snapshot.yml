name: LiveF1 Snapshot

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      season:
        description: Season year (optional)
        required: false
      round:
        description: Round number (optional)
        required: false
      force:
        description: Force re-dump even if file exists
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run LiveF1 dump
        run: |
          args=""
          if [ -n "${{ inputs.season }}" ]; then args="$args --season ${{ inputs.season }}"; fi
          if [ -n "${{ inputs.round }}" ]; then args="$args --round ${{ inputs.round }}"; fi
          if [ "${{ inputs.force }}" = "true" ]; then args="$args --force"; fi
          python scripts/livef1_dump.py $args

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/livef1/
          if git diff --staged --quiet; then
            echo "No new snapshot data."
          else
            git commit -m "chore: update LiveF1 snapshot"
            git push
          fi
